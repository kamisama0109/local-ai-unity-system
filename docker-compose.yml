version: '3.8'

services:
  qwen:
    image: qwen:latest
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/models/qwen
    volumes:
      - ./models/qwen:/models/qwen

  phi-3:
    image: phi-3:latest
    ports:
      - "8001:8001"
    environment:
      - MODEL_PATH=/models/phi-3
    volumes:
      - ./models/phi-3:/models/phi-3
